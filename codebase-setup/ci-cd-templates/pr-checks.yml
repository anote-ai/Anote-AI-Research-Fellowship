# GitHub Actions PR Quality Checks
# Copy to .github/workflows/pr-checks.yml in your product repo
# Enforces PR quality gates: branch naming, commit messages, PR description completeness

name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-description:
    name: PR Description Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description is not empty
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.trim().length < 50) {
              core.setFailed(
                'PR description is too short. Please describe what changed and why (at least 50 characters).'
              );
            }

  branch-name:
    name: Branch Name Check
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name format
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            // Allow: your-name/feature-description, fix/something, feat/something, chore/something
            const allowed = /^(feat|fix|chore|docs|refactor|test|ci|your\-name)\/[\w\-]+$/;
            // More permissive: allow any branch with at least one slash
            const hasSlash = branch.includes('/');
            if (!hasSlash && branch !== 'develop') {
              core.warning(
                `Branch "${branch}" does not follow the naming convention: <type>/<description> (e.g. feat/add-benchmark)`
              );
              // Warning only, not failure — adjust to core.setFailed() if you want to enforce strictly
            }

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR diff size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const total = additions + deletions;
            if (total > 1000) {
              core.warning(
                `This PR changes ${total} lines. Consider splitting into smaller PRs for easier review.`
              );
            }
            console.log(`PR size: +${additions} -${deletions} (${total} total)`);
