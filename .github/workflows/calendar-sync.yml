name: Calendar Sync

on:
  push:
    branches: [main]
    paths:
      - 'calendar/events.yaml'
      - 'calendar/generate_ics.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ics:
    name: Regenerate fellowship.ics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Generate .ics
        run: python calendar/generate_ics.py

      - name: Commit updated .ics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar/fellowship.ics
          if git diff --staged --quiet; then
            echo "No changes to fellowship.ics"
          else
            git commit -m "chore: regenerate fellowship.ics from events.yaml [skip ci]"
            git push
          fi
